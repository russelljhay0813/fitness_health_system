{% extends 'base.html' %}

{% block content %}
<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="logo"></div>
            <h2>Start Your Journey</h2>
            <p>Create your fitness account</p>
        </div>
        
        <form method="post" class="register-form">
            {% csrf_token %}
            
            <div class="form-group">
                <input type="text" name="username" id="id_username" class="form-input" 
                       placeholder="Username" required>
                <i class="input-icon"></i>
            </div>
            
            <div class="form-group">
                <input type="email" name="email" id="id_email" class="form-input" 
                       placeholder="Email address" required>
                <i class="input-icon"></i>
            </div>
            <div class="form-group">
                <input type="password" name="password1" id="id_password1" class="form-input" 
                       placeholder="Password" required>
                <i class="input-icon"></i>
            </div>
            
            <div class="form-group">
                <input type="password" name="password2" id="id_password2" class="form-input" 
                       placeholder="Confirm password" required>
                <i class="input-icon"></i>
            </div>
            
            <button type="submit" class="register-btn">Create Account</button>
        </form>
        
        <div class="register-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>
</div>

<style>
    .register-container {
        min-height: calc(100vh - 72px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
    }
    
    .register-card {
        background: white;
        max-width: 480px;
        width: 100%;
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 20px 40px rgba(46, 125, 50, 0.15);
        transition: transform 0.3s;
    }
    
    .register-card:hover {
        transform: translateY(-5px);
    }
    
    .register-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .logo {
        font-size: 3.5rem;
        margin-bottom: 0.5rem;
    }
    
    .register-header h2 {
        color: #2e7d32;
        font-size: 1.75rem;
        margin: 0 0 0.5rem 0;
        font-weight: 600;
    }
    
    .register-header p {
        color: #6c757d;
        font-size: 0.9rem;
        margin: 0;
    }
    
    .form-group {
        position: relative;
        margin-bottom: 1.25rem;
    }
    
    .form-input {
        width: 100%;
        padding: 12px 16px 12px 45px;
        border: 2px solid #e8f5e9;
        border-radius: 12px;
        font-size: 0.95rem;
        transition: all 0.2s;
        background: #fafafa;
    }
    
    .form-input:focus {
        outline: none;
        border-color: #2e7d32;
        background: white;
        box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
    }
    
    .input-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        font-style: normal;
        font-size: 1.1rem;
        color: #2e7d32;
    }
    
    .register-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
    }
    
    .register-btn:hover {
        background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
    }
    
    .register-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 2px solid #e8f5e9;
    }
    
    .register-footer a {
        color: #2e7d32;
        text-decoration: none;
        font-weight: 600;
    }
    
    .register-footer a:hover {
        text-decoration: underline;
        color: #1b5e20;
    }
</style>
{% endblock %}
