{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Log Your Meal</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_meal_type" class="form-label">Meal Type</label>
                        <select name="meal_type" id="id_meal_type" class="form-select" required>
                            <option value="">Select meal type</option>
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                            <option value="snack">Snack</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_food_name" class="form-label">Food Name</label>
                        <input type="text" name="food_name" id="id_food_name" 
                               class="form-control" required placeholder="e.g., Grilled Chicken Salad">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_calories" class="form-label">Calories</label>
                        <input type="number" name="calories" id="id_calories" 
                               class="form-control" required min="0" placeholder="Calorie value">
                        <small class="text-muted">How many calories?</small>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="id_protein" class="form-label">Protein (g)</label>
                            <input type="number" name="protein" id="id_protein" 
                                   class="form-control" step="0.1" value="0">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="id_carbs" class="form-label">Carbs (g)</label>
                            <input type="number" name="carbs" id="id_carbs" 
                                   class="form-control" step="0.1" value="0">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="id_fat" class="form-label">Fat (g)</label>
                            <input type="number" name="fat" id="id_fat" 
                                   class="form-control" step="0.1" value="0">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Save Meal</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
